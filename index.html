<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Study Planner</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <h1>📚 Smart Study Planner</h1>
  <p class="subtitle">Plan smarter, stay consistent, and reach your goals 🚀</p>

  <div class="card">
    <label>📅 Exam Date</label>
    <input type="date" id="examDate">

    <label>📖 Subjects</label>
    <input type="text" id="subjects" placeholder="physics, chemistry, math">

    <label>🧠 Mood</label>
    <select id="mood">
      <option value="low">😴 Low</option>
      <option value="normal" selected>🙂 Normal</option>
      <option value="high">🔥 Motivated</option>
    </select>

    <div class="btns">
      <button onclick="generatePlan()">Generate Plan</button>
      <button onclick="autoAdjust()">Auto Adjust</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">

  <div class="stat-box">
    <div class="stat-icon">🔥</div>
    <div class="stat-label">Streak</div>
    <div class="stat-value" id="streak">0</div>
  </div>

  <div class="stat-box">
    <div class="stat-icon">📊</div>
    <div class="stat-label">Progress</div>
    <div class="stat-value" id="progress">0%</div>
  </div>

  <div class="stat-box">
    <div class="stat-icon">🎯</div>
    <div class="stat-label">Focus</div>
    <div class="stat-value" id="weak">-</div>
  </div>

</div>

  <!-- GRAPH -->
  <div class="card">
    <canvas id="chart"></canvas>
  </div>

  <!-- TODAY FOCUS -->
  <h2>🔥 Today’s Focus</h2>
  <div id="todayFocus" class="focus-box">No focus yet</div>

  <!-- PLAN -->
  <h2>📅 Your Study Plan</h2>
  <div id="output" class="grid"></div>

</div>

<script src="script.js"></script>
</body>
</html>
